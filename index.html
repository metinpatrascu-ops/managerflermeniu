<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>fler manager</title>
<style>
  body{
    margin:0;
    font-family:Inter,system-ui,sans-serif;
    background:#171614;
    color:#f1ece4;
  }
  #app{
    min-height:100vh;
  }
  .shell{
    display:grid;
    grid-template-columns:260px 1fr;
    min-height:100vh;
  }
  .sidebar{
    background:#1c1b19;
    border-right:1px solid #393836;
    padding:24px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .pill{
    min-height:38px;
    border-radius:12px;
    border:1px solid #393836;
    background:#201f1d;
    color:#f1ece4;
    font-weight:700;
    cursor:pointer;
  }
  .nav{
    min-height:44px;
    border:none;
    border-radius:12px;
    background:transparent;
    color:#b6ada1;
    text-align:left;
    padding:0 12px;
  }
  .nav.active{
    background:rgba(179,93,45,.14);
    color:#f1ece4;
  }
  .content{
    padding:32px;
  }
  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:24px;
  }
  .panel{
    background:#1c1b19;
    border:1px solid #393836;
    border-radius:18px;
    padding:24px;
    display:grid;
    gap:16px;
    max-width:420px;
  }
  .row{
    display:grid;
    gap:6px;
  }
  .row label{
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:#b6ada1;
  }
  .row input{
    min-height:46px;
    border-radius:12px;
    border:1px solid #393836;
    background:#201f1d;
    color:#f1ece4;
    padding:0 14px;
  }
  .actions{
    display:flex;
    gap:12px;
  }
  .btn{
    min-height:46px;
    padding:0 16px;
    border-radius:12px;
    border:1px solid #393836;
    background:#201f1d;
    color:#f1ece4;
    font-weight:700;
    cursor:pointer;
  }
  .btn.primary{
    background:#b35d2d;
    border-color:#b35d2d;
  }
  .status{
    font-size:13px;
    color:#b6ada1;
    min-height:18px;
  }
</style>
</head>
<body>
<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAHqazy7HDgsdWaw_46YFvsI-7lPSXYtwM",
  authDomain: "fler-manager.firebaseapp.com",
  projectId: "fler-manager",
  storageBucket: "fler-manager.firebasestorage.app",
  messagingSenderId: "141246687330",
  appId: "1:141246687330:web:46084b41f23a4e7755493b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, (user) => {
  console.log('Auth state:', user ? user.email : 'logged out');
});

const root = document.getElementById('app');

root.innerHTML = `
  <main class="shell">
    <aside class="sidebar">
      <h1>fler manager</h1>
      <button id="langBtn" class="pill">RO</button>
      <nav>
        <button class="nav active">Dashboard</button>
        <button class="nav">Popup ofertă</button>
        <button class="nav">Discounturi</button>
      </nav>
    </aside>
    <section class="content">
      <div class="topbar">
        <div>
          <h2 id="title">English interface</h2>
          <p id="subtitle">Switch with RO button.</p>
        </div>
        <button id="logoutBtn" class="btn">Logout</button>
      </div>
      <div class="panel">
        <div class="row"><label>Email</label><input id="email" type="email" placeholder="manager@example.com"></div>
        <div class="row"><label>Password</label><input id="password" type="password" placeholder="••••••••"></div>
        <div class="actions">
          <button id="loginBtn" class="btn primary">Login</button>
          <button id="createBtn" class="btn">Create account</button>
        </div>
        <div id="status" class="status"></div>
      </div>
    </section>
  </main>
`;

const langBtn = document.getElementById('langBtn');
const title = document.getElementById('title');
const subtitle = document.getElementById('subtitle');
const loginBtn = document.getElementById('loginBtn');
const createBtn = document.getElementById('createBtn');
const logoutBtn = document.getElementById('logoutBtn');
const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');
const statusBox = document.getElementById('status');

let lang = 'en';

function renderLang() {
  if (lang === 'en') {
    title.textContent = 'English interface';
    subtitle.textContent = 'Switch with RO button.';
    langBtn.textContent = 'RO';
    loginBtn.textContent = 'Login';
    createBtn.textContent = 'Create account';
    logoutBtn.textContent = 'Logout';
  } else {
    title.textContent = 'Interfață în română';
    subtitle.textContent = 'Schimbă limba cu butonul RO/EN.';
    langBtn.textContent = 'EN';
    loginBtn.textContent = 'Autentificare';
    createBtn.textContent = 'Creează cont';
    logoutBtn.textContent = 'Ieșire';
  }
}

langBtn.onclick = () => {
  lang = lang === 'en' ? 'ro' : 'en';
  renderLang();
};

loginBtn.onclick = async () => {
  statusBox.textContent = '';
  try {
    await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
    statusBox.textContent = 'Login OK';
  } catch (err) {
    statusBox.textContent = err.message;
  }
};

createBtn.onclick = async () => {
  statusBox.textContent = '';
  try {
    await createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
    statusBox.textContent = 'Account created';
  } catch (err) {
    statusBox.textContent = err.message;
  }
};

logoutBtn.onclick = async () => {
  await signOut(auth);
  statusBox.textContent = 'Logged out';
};

renderLang();
</script>
</body>
</html>

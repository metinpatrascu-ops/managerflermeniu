<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>fler manager</title>
<style>
  body{
    margin:0;
    font-family:Inter,system-ui,sans-serif;
    background:#171614;
    color:#f1ece4;
  }
  #app{
    min-height:100vh;
  }
  .shell{
    display:grid;
    grid-template-columns:260px 1fr;
    min-height:100vh;
  }
  .sidebar{
    background:#1c1b19;
    border-right:1px solid #393836;
    padding:24px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .pill{
    min-height:38px;
    border-radius:12px;
    border:1px solid #393836;
    background:#201f1d;
    color:#f1ece4;
    font-weight:700;
    cursor:pointer;
  }
  .nav{
    min-height:44px;
    border:none;
    border-radius:12px;
    background:transparent;
    color:#b6ada1;
    text-align:left;
    padding:0 12px;
    cursor:pointer;
  }
  .nav.active{
    background:rgba(179,93,45,.14);
    color:#f1ece4;
  }
  .content{
    padding:32px;
  }
  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:24px;
  }
  .panel{
    background:#1c1b19;
    border:1px solid #393836;
    border-radius:18px;
    padding:24px;
    display:grid;
    gap:16px;
    max-width:420px;
  }
  .row{
    display:grid;
    gap:6px;
  }
  .row label{
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:#b6ada1;
  }
  .row input{
    min-height:46px;
    border-radius:12px;
    border:1px solid #393836;
    background:#201f1d;
    color:#f1ece4;
    padding:0 14px;
  }
  .actions{
    display:flex;
    gap:12px;
  }
  .btn{
    min-height:46px;
    padding:0 16px;
    border-radius:12px;
    border:1px solid #393836;
    background:#201f1d;
    color:#f1ece4;
    font-weight:700;
    cursor:pointer;
  }
  .btn.primary{
    background:#b35d2d;
    border-color:#b35d2d;
  }
  .status{
    font-size:13px;
    color:#b6ada1;
    min-height:18px;
  }
  .hidden{
    display:none;
  }
  .badge{
    background:#201f1d;
    border:1px solid #393836;
    border-radius:999px;
    padding:6px 14px;
    font-size:13px;
    color:#b6ada1;
    width:fit-content;
  }
  .cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:16px;
    margin-top:20px;
  }
  .card{
    background:#1c1b19;
    border:1px solid #393836;
    border-radius:16px;
    padding:20px;
  }
  .card h3{
    margin:0 0 6px;
    font-size:14px;
    color:#b6ada1;
  }
  .card p{
    margin:0;
    font-size:24px;
    font-weight:700;
  }
</style>
</head>
<body>
<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAHqazy7HDgsdWaw_46YFvsI-7lPSXYtwM",
  authDomain: "fler-manager.firebaseapp.com",
  projectId: "fler-manager",
  storageBucket: "fler-manager.firebasestorage.app",
  messagingSenderId: "141246687330",
  appId: "1:141246687330:web:46084b41f23a4e7755493b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const root = document.getElementById('app');
let lang = 'en';
let currentUser = null;

const texts = {
  en: {
    heading: 'English interface',
    subtitle: 'Switch with RO button.',
    langBtn: 'RO',
    loginBtn: 'Login',
    createBtn: 'Create account',
    logoutBtn: 'Logout',
    emailLabel: 'Email',
    passwordLabel: 'Password',
    dashboardTitle: 'Dashboard',
    welcome: 'Signed in as',
    products: 'Products',
    popup: 'Active popup',
    discounts: 'Active discounts',
    nav: ['Dashboard', 'Popup ofertă', 'Discounturi']
  },
  ro: {
    heading: 'Interfață în română',
    subtitle: 'Schimbă limba cu butonul RO/EN.',
    langBtn: 'EN',
    loginBtn: 'Autentificare',
    createBtn: 'Creează cont',
    logoutBtn: 'Ieșire',
    emailLabel: 'Email',
    passwordLabel: 'Parolă',
    dashboardTitle: 'Panou principal',
    welcome: 'Autentificat ca',
    products: 'Produse',
    popup: 'Popup activ',
    discounts: 'Discounturi active',
    nav: ['Dashboard', 'Popup ofertă', 'Discounturi']
  }
};

function renderLoginView() {
  const t = texts[lang];
  root.innerHTML = `
    <main class="shell">
      <aside class="sidebar">
        <h1>fler manager</h1>
        <button id="langBtn" class="pill">${t.langBtn}</button>
        <nav>
          <button class="nav active">${t.nav[0]}</button>
          <button class="nav">${t.nav[1]}</button>
          <button class="nav">${t.nav[2]}</button>
        </nav>
      </aside>
      <section class="content">
        <div class="topbar">
          <div>
            <h2>${t.heading}</h2>
            <p>${t.subtitle}</p>
          </div>
        </div>
        <div class="panel">
          <div class="row"><label>${t.emailLabel}</label><input id="email" type="email" placeholder="manager@example.com"></div>
          <div class="row"><label>${t.passwordLabel}</label><input id="password" type="password" placeholder="••••••••"></div>
          <div class="actions">
            <button id="loginBtn" class="btn primary">${t.loginBtn}</button>
            <button id="createBtn" class="btn">${t.createBtn}</button>
          </div>
          <div id="status" class="status"></div>
        </div>
      </section>
    </main>
  `;

  document.getElementById('langBtn').onclick = () => {
    lang = lang === 'en' ? 'ro' : 'en';
    renderLoginView();
  };

  document.getElementById('loginBtn').onclick = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const status = document.getElementById('status');
    status.textContent = '';
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (err) {
      status.textContent = err.message;
    }
  };

  document.getElementById('createBtn').onclick = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const status = document.getElementById('status');
    status.textContent = '';
    try {
      await createUserWithEmailAndPassword(auth, email, password);
    } catch (err) {
      status.textContent = err.message;
    }
  };
}

function renderDashboard() {
  const t = texts[lang];
  root.innerHTML = `
    <main class="shell">
      <aside class="sidebar">
        <h1>fler manager</h1>
        <button id="langBtn" class="pill">${t.langBtn}</button>
        <nav>
          <button class="nav active">${t.nav[0]}</button>
          <button class="nav">${t.nav[1]}</button>
          <button class="nav">${t.nav[2]}</button>
        </nav>
      </aside>
      <section class="content">
        <div class="topbar">
          <div>
            <h2>${t.dashboardTitle}</h2>
            <div class="badge">${t.welcome}: ${currentUser.email}</div>
          </div>
          <button id="logoutBtn" class="btn">${t.logoutBtn}</button>
        </div>
        <div class="cards">
          <div class="card"><h3>${t.products}</h3><p>—</p></div>
          <div class="card"><h3>${t.popup}</h3><p>—</p></div>
          <div class="card"><h3>${t.discounts}</h3><p>—</p></div>
        </div>
      </section>
    </main>
  `;

  document.getElementById('langBtn').onclick = () => {
    lang = lang === 'en' ? 'ro' : 'en';
    renderDashboard();
  };

  document.getElementById('logoutBtn').onclick = async () => {
    await signOut(auth);
  };
}

onAuthStateChanged(auth, (user) => {
  currentUser = user;
  if (user) {
    renderDashboard();
  } else {
    renderLoginView();
  }
});
</script>
</body>
</html>

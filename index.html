<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>fler manager</title>
<style>
  body{margin:0;font-family:Inter,system-ui,sans-serif;background:#171614;color:#f1ece4;}
  #app{min-height:100vh;}
  .shell{display:grid;grid-template-columns:260px 1fr;min-height:100vh;}
  .sidebar{background:#1c1b19;border-right:1px solid #393836;padding:24px;display:flex;flex-direction:column;gap:16px;}
  .pill{min-height:38px;border-radius:12px;border:1px solid #393836;background:#201f1d;color:#f1ece4;font-weight:700;cursor:pointer;}
  .nav{min-height:44px;border:none;border-radius:12px;background:transparent;color:#b6ada1;text-align:left;padding:0 12px;cursor:pointer;}
  .nav.active{background:rgba(179,93,45,.14);color:#f1ece4;}
  .content{padding:32px;}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
  .panel{background:#1c1b19;border:1px solid #393836;border-radius:18px;padding:24px;display:grid;gap:16px;max-width:520px;margin-bottom:24px;}
  .row{display:grid;gap:6px;}
  .row label{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:#b6ada1;}
  .row input, .row textarea{min-height:46px;border-radius:12px;border:1px solid #393836;background:#201f1d;color:#f1ece4;padding:10px 14px;font-family:inherit;}
  .actions{display:flex;gap:12px;}
  .btn{min-height:46px;padding:0 16px;border-radius:12px;border:1px solid #393836;background:#201f1d;color:#f1ece4;font-weight:700;cursor:pointer;}
  .btn.primary{background:#b35d2d;border-color:#b35d2d;}
  .status{font-size:13px;color:#b6ada1;min-height:18px;}
  .badge{background:#201f1d;border:1px solid #393836;border-radius:999px;padding:6px 14px;font-size:13px;color:#b6ada1;width:fit-content;}
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;}
  .card{background:#1c1b19;border:1px solid #393836;border-radius:16px;padding:20px;}
  .card h3{margin:0 0 6px;font-size:14px;color:#b6ada1;}
  .card p{margin:0;font-size:24px;font-weight:700;}
  .list-item{display:flex;justify-content:space-between;align-items:center;border:1px solid #393836;border-radius:12px;padding:10px 14px;margin-bottom:8px;gap:10px;}
  .list-item input{min-height:38px;border-radius:8px;border:1px solid #393836;background:#201f1d;color:#f1ece4;padding:6px 10px;font-family:inherit;}
  .list-item .rowfields{display:flex;gap:10px;flex:1;align-items:center;}
  .list-item .rowfields input.pname{flex:2;}
  .list-item .rowfields input.pprice{flex:1;max-width:110px;}
  .del{background:none;border:1px solid #664;color:#e88;border-radius:8px;padding:4px 10px;cursor:pointer;}
  .save-row{background:none;border:1px solid #393836;color:#b6ada1;border-radius:8px;padding:4px 10px;cursor:pointer;}
  .products-list{max-width:820px;}
  .search-row{display:flex;gap:12px;margin-bottom:16px;max-width:820px;}
  .search-row input{flex:1;}
  select.pcat, .row select{min-height:46px;border-radius:12px;border:1px solid #393836;background:#201f1d;color:#f1ece4;padding:10px 14px;font-family:inherit;}
  .list-item .rowfields select.pcat{flex:1.5;}
  .list-item .pdesc{min-height:50px;border-radius:8px;border:1px solid #393836;background:#201f1d;color:#f1ece4;padding:8px 10px;font-family:inherit;width:100%;box-sizing:border-box;resize:vertical;}

  /* --- Responsive optimizations --- */
  @media (max-width: 900px) {
    .shell{grid-template-columns:1fr;}
    .sidebar{
      position:sticky;top:0;z-index:10;
      flex-direction:row;align-items:center;
      overflow-x:auto;
      padding:14px 16px;
      gap:10px;
      border-right:none;
      border-bottom:1px solid #393836;
      white-space:nowrap;
    }
    .sidebar h1{font-size:16px;margin:0;flex-shrink:0;}
    .sidebar .pill{flex-shrink:0;}
    .sidebar nav{display:flex;flex-direction:row;gap:8px;overflow-x:auto;}
    .sidebar nav .nav{flex-shrink:0;white-space:nowrap;padding:0 14px;}
    .content{padding:16px;}
    .panel{max-width:100%;}
    .cards{grid-template-columns:1fr;}
    .topbar{flex-direction:column;align-items:flex-start;gap:10px;}
    .topbar .btn{width:100%;}
    .list-item{flex-direction:column;align-items:stretch;gap:10px;}
    .list-item .rowfields{flex-direction:column;align-items:stretch;}
    .list-item .rowfields input.pname,
    .list-item .rowfields input.pprice,
    .list-item .rowfields select.pcat{
      width:100%;max-width:100%;flex:none;
    }
    .list-item .save-row, .list-item .del{width:100%;}
    .search-row{flex-direction:column;}
    .search-row input{width:100%;}
  }

  @media (max-width: 480px) {
    .sidebar h1{font-size:14px;}
    .card p{font-size:20px;}
    .btn, .pill, .nav{font-size:13px;}
    .row input, .row textarea, select.pcat, .row select{font-size:14px;}
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>
<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth, onAuthStateChanged, signInWithEmailAndPassword,
  createUserWithEmailAndPassword, signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, collection, addDoc, updateDoc, deleteDoc, doc,
  getDocs, setDoc, getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAHqazy7HDgsdWaw_46YFvsI-7lPSXYtwM",
  authDomain: "fler-manager.firebaseapp.com",
  projectId: "fler-manager",
  storageBucket: "fler-manager.firebasestorage.app",
  messagingSenderId: "141246687330",
  appId: "1:141246687330:web:46084b41f23a4e7755493b"
};

const CATEGORIES = ["OPENINGS — ALL DAY", "LAYERS", "COMPOSITIONS", "ENSEMBLE", "CENTERPIECE", "HANDHELD", "ADDITIONS", "FINALE", "DAILY RITUAL", "COCKTAILS COMPOSITIONS", "ZERO PROOF STUDIES", "SHOTS RITUALS", "SPIRITS & WINES THE COLLECTION", "REFRESHMENTS & BEER"];

const OWNER_EMAIL = "metinpatrascu@gmail.com";

// --- EmailJS config: inlocuieste cu datele contului tau EmailJS (emailjs.com, gratuit) ---
const EMAILJS_SERVICE_ID = "YOUR_SERVICE_ID";
const EMAILJS_TEMPLATE_ID = "YOUR_TEMPLATE_ID";
const EMAILJS_PUBLIC_KEY = "YOUR_PUBLIC_KEY";
let emailjsReady = false;
try {
  if (window.emailjs && EMAILJS_PUBLIC_KEY !== "YOUR_PUBLIC_KEY") {
    window.emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });
    emailjsReady = true;
  }
} catch (e) {}

async function notifyOwnerNewRequest(newUserEmail) {
  if (!emailjsReady) {
    console.warn("EmailJS nu este configurat. Adauga SERVICE_ID, TEMPLATE_ID si PUBLIC_KEY in cod.");
    return;
  }
  try {
    await window.emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      to_email: OWNER_EMAIL,
      new_user_email: newUserEmail,
      message: "Un utilizator nou a solicitat acces la fler manager: " + newUserEmail
    });
  } catch (e) { console.error("Eroare trimitere email:", e); }
}

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const root = document.getElementById('app');
let lang = 'en';
let currentUser = null;
let view = 'dashboard';
let productSearch = '';
let pendingMessage = '';

const texts = {
  en: { title:'fler manager', langBtn:'RO', loginBtn:'Login', createBtn:'Create account',
    logoutBtn:'Logout', emailLabel:'Email', passwordLabel:'Password',
    nav:['Dashboard','Products','Popup ofertă','Discounturi','Users'],
    dashboard:'Dashboard', products:'Products', popup:'Active popup', discounts:'Active discounts',
    welcome:'Signed in as', addProduct:'Add product', name:'Name', price:'Price (RON)',
    popupTitle:'Popup title', popupText:'Popup text', save:'Save', discountName:'Discount name', discountValue:'Value (%)',
    searchPlaceholder:'Search products...', saveRow:'Save', noProducts:'No products found', category:'Category',
    description:'Description / Recipe', descriptionPlaceholder:'Ingredients, allergens, etc.',
    users:'Users', pendingApproval:'Pending approval', approve:'Approve', reject:'Reject', noPending:'No pending requests',
    requestSent:'Account request sent. Waiting for owner approval — you will get access once approved.',
    accountPending:'Your account is waiting for approval from the administrator.',
    accountRejected:'Your account request was rejected.' },
  ro: { title:'fler manager', langBtn:'EN', loginBtn:'Autentificare', createBtn:'Creează cont',
    logoutBtn:'Ieșire', emailLabel:'Email', passwordLabel:'Parolă',
    nav:['Dashboard','Produse','Popup ofertă','Discounturi','Utilizatori'],
    dashboard:'Panou principal', products:'Produse', popup:'Popup activ', discounts:'Discounturi active',
    welcome:'Autentificat ca', addProduct:'Adaugă produs', name:'Nume', price:'Preț (RON)',
    popupTitle:'Titlu popup', popupText:'Text popup', save:'Salvează', discountName:'Nume discount', discountValue:'Valoare (%)',
    searchPlaceholder:'Caută produse...', saveRow:'Salvează', noProducts:'Niciun produs găsit', category:'Categorie',
    description:'Descriere / Rețetă', descriptionPlaceholder:'Ingrediente, alergeni, etc.',
    users:'Utilizatori', pendingApproval:'În așteptare', approve:'Aprobă', reject:'Respinge', noPending:'Nicio cerere în așteptare',
    requestSent:'Cerere de cont trimisă. Așteaptă aprobarea administratorului — vei avea acces după aprobare.',
    accountPending:'Contul tău este în așteptarea aprobării administratorului.',
    accountRejected:'Cererea ta de cont a fost respinsă.' }
};

function escapeHtml(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function sidebar(t, active, isOwner) {
  const navItems = [
    { label: t.nav[0], view: 'dashboard' },
    { label: t.nav[1], view: 'products' },
    { label: t.nav[2], view: 'popup' },
    { label: t.nav[3], view: 'discounts' }
  ];
  if (isOwner) navItems.push({ label: t.nav[4], view: 'users' });

  return `
    <aside class="sidebar">
      <h1>${t.title}</h1>
      <button id="langBtn" class="pill">${t.langBtn}</button>
      <nav>
        ${navItems.map((n, i) => `<button class="nav ${active===i?'active':''}" data-view="${n.view}">${n.label}</button>`).join('')}
      </nav>
    </aside>`;
}

function bindNav() {
  document.getElementById('langBtn').onclick = () => { lang = lang==='en'?'ro':'en'; renderApp(); };
  document.querySelectorAll('.nav').forEach(btn => {
    btn.onclick = () => { view = btn.dataset.view; renderApp(); };
  });
}

async function renderLoginView() {
  const t = texts[lang];
  root.innerHTML = `
    <main class="shell">
      ${sidebar(t, 0, false)}
      <section class="content">
        <div class="panel">
          <div class="row"><label>${t.emailLabel}</label><input id="email" type="email"></div>
          <div class="row"><label>${t.passwordLabel}</label><input id="password" type="password"></div>
          <div class="actions">
            <button id="loginBtn" class="btn primary">${t.loginBtn}</button>
            <button id="createBtn" class="btn">${t.createBtn}</button>
          </div>
          <div id="status" class="status">${escapeHtml(pendingMessage)}</div>
        </div>
      </section>
    </main>`;
  bindNav();
  document.getElementById('loginBtn').onclick = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const status = document.getElementById('status');
    try { await signInWithEmailAndPassword(auth, email, password); }
    catch (err) { status.textContent = err.message; }
  };
  document.getElementById('createBtn').onclick = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const status = document.getElementById('status');
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await setDoc(doc(db, 'userRequests', cred.user.uid), {
        email: cred.user.email,
        status: 'pending',
        createdAt: new Date().toISOString()
      });
      await notifyOwnerNewRequest(cred.user.email);
      pendingMessage = t.requestSent;
      await signOut(auth);
    }
    catch (err) { status.textContent = err.message; }
  };
}

async function renderDashboard() {
  const t = texts[lang];
  const productsSnap = await getDocs(collection(db, 'products'));
  const popupSnap = await getDoc(doc(db, 'popup', 'main'));
  const discountsSnap = await getDocs(collection(db, 'discounts'));
  const isOwner = currentUser.email === OWNER_EMAIL;

  root.innerHTML = `
    <main class="shell">
      ${sidebar(t, 0, isOwner)}
      <section class="content">
        <div class="topbar">
          <div>
            <h2>${t.dashboard}</h2>
            <div class="badge">${t.welcome}: ${currentUser.email}</div>
          </div>
          <button id="logoutBtn" class="btn">${t.logoutBtn}</button>
        </div>
        <div class="cards">
          <div class="card"><h3>${t.products}</h3><p>${productsSnap.size}</p></div>
          <div class="card"><h3>${t.popup}</h3><p>${popupSnap.exists() ? '1' : '0'}</p></div>
          <div class="card"><h3>${t.discounts}</h3><p>${discountsSnap.size}</p></div>
        </div>
      </section>
    </main>`;
  bindNav();
  document.getElementById('logoutBtn').onclick = async () => { await signOut(auth); };
}

async function renderProducts() {
  const t = texts[lang];
  const isOwner = currentUser.email === OWNER_EMAIL;
  const colRef = collection(db, 'products');
  const snap = await getDocs(colRef);
  let allDocs = [];
  snap.forEach(d => allDocs.push({ id: d.id, ...d.data() }));
  allDocs.sort((a,b) => (a.name||'').localeCompare(b.name||''));

  const filtered = productSearch
    ? allDocs.filter(p => (p.name||'').toLowerCase().includes(productSearch.toLowerCase()))
    : allDocs;

  let items = '';
  filtered.forEach(p => {
    items += `
      <div class="list-item" data-id="${p.id}">
        <div class="rowfields" style="flex-direction:column;align-items:stretch;gap:8px;">
          <div style="display:flex;gap:10px;">
            <input class="pname" style="flex:2;" value="${escapeHtml(p.name)}">
            <input class="pprice" type="number" style="flex:1;max-width:110px;" value="${p.price ?? ''}">
            <select class="pcat" style="flex:1.5;">${CATEGORIES.map(c => `<option value="${escapeHtml(c)}" ${c===p.category?'selected':''}>${escapeHtml(c)}</option>`).join('')}</select>
          </div>
          <textarea class="pdesc" rows="2" placeholder="${t.descriptionPlaceholder}">${escapeHtml(p.description || '')}</textarea>
        </div>
        <button class="save-row" data-id="${p.id}">${t.saveRow}</button>
        <button class="del" data-id="${p.id}">✕</button>
      </div>`;
  });
  if (!filtered.length) items = `<div class="status">${t.noProducts}</div>`;

  root.innerHTML = `
    <main class="shell">
      ${sidebar(t, 1, isOwner)}
      <section class="content">
        <div class="topbar">
          <h2>${t.products} (${allDocs.length})</h2>
          <button id="logoutBtn" class="btn">${t.logoutBtn}</button>
        </div>
        <div class="panel">
          <div class="row"><label>${t.name}</label><input id="newName"></div>
          <div class="row"><label>${t.price}</label><input id="newPrice" type="number"></div>
          <div class="row"><label>${t.category}</label><select id="newCategory">${CATEGORIES.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('')}</select></div>
          <div class="row"><label>${t.description}</label><textarea id="newDescription" rows="2" placeholder="${t.descriptionPlaceholder}"></textarea></div>
          <div class="actions"><button id="addBtn" class="btn primary">${t.addProduct}</button></div>
          <div id="addStatus" class="status"></div>
        </div>
        <div class="search-row">
          <input id="searchInput" placeholder="${t.searchPlaceholder}" value="${escapeHtml(productSearch)}">
        </div>
        <div class="products-list">${items}</div>
      </section>
    </main>`;
  bindNav();

  document.getElementById('logoutBtn').onclick = async () => { await signOut(auth); };

  document.getElementById('addBtn').onclick = async () => {
    const name = document.getElementById('newName').value.trim();
    const price = Number(document.getElementById('newPrice').value);
    const category = document.getElementById('newCategory').value;
    const description = document.getElementById('newDescription').value.trim();
    if (!name) { document.getElementById('addStatus').textContent = 'Name required'; return; }
    await addDoc(colRef, { name, price, category, description });
    productSearch = '';
    renderProducts();
  };

  document.getElementById('searchInput').oninput = (e) => {
    productSearch = e.target.value;
    renderProducts();
  };

  document.querySelectorAll('.save-row').forEach(btn => {
    btn.onclick = async () => {
      const id = btn.dataset.id;
      const item = document.querySelector(`.list-item[data-id="${id}"]`);
      const name = item.querySelector('.pname').value.trim();
      const price = Number(item.querySelector('.pprice').value);
      const category = item.querySelector('.pcat').value;
      const description = item.querySelector('.pdesc').value.trim();
      await updateDoc(doc(db, 'products', id), { name, price, category, description });
      btn.textContent = '✓';
      setTimeout(() => { btn.textContent = t.saveRow; }, 1200);
    };
  });

  document.querySelectorAll('.del').forEach(btn => {
    btn.onclick = async () => {
      await deleteDoc(doc(db, 'products', btn.dataset.id));
      renderProducts();
    };
  });
}

async function renderPopup() {
  const t = texts[lang];
  const isOwner = currentUser.email === OWNER_EMAIL;
  const popupRef = doc(db, 'popup', 'main');
  const snap = await getDoc(popupRef);
  const data = snap.exists() ? snap.data() : { title:'', text:'' };

  root.innerHTML = `
    <main class="shell">
      ${sidebar(t, 2, isOwner)}
      <section class="content">
        <div class="topbar">
          <h2>${t.popup}</h2>
          <button id="logoutBtn" class="btn">${t.logoutBtn}</button>
        </div>
        <div class="panel">
          <div class="row"><label>${t.popupTitle}</label><input id="pTitle" value="${escapeHtml(data.title)}"></div>
          <div class="row"><label>${t.popupText}</label><textarea id="pText" rows="3">${escapeHtml(data.text)}</textarea></div>
          <div class="actions"><button id="saveBtn" class="btn primary">${t.save}</button></div>
          <div id="status" class="status"></div>
        </div>
      </section>
    </main>`;
  bindNav();
  document.getElementById('logoutBtn').onclick = async () => { await signOut(auth); };
  document.getElementById('saveBtn').onclick = async () => {
    await setDoc(popupRef, {
      title: document.getElementById('pTitle').value,
      text: document.getElementById('pText').value
    });
    document.getElementById('status').textContent = 'Saved';
  };
}

async function renderDiscounts() {
  const t = texts[lang];
  const isOwner = currentUser.email === OWNER_EMAIL;
  const colRef = collection(db, 'discounts');
  const snap = await getDocs(colRef);
  let items = '';
  snap.forEach(d => {
    const v = d.data();
    items += `<div class="list-item"><span>${escapeHtml(v.name)} — ${v.value}%</span><button class="del" data-id="${d.id}">✕</button></div>`;
  });

  root.innerHTML = `
    <main class="shell">
      ${sidebar(t, 3, isOwner)}
      <section class="content">
        <div class="topbar">
          <h2>${t.discounts}</h2>
          <button id="logoutBtn" class="btn">${t.logoutBtn}</button>
        </div>
        <div class="panel">
          <div class="row"><label>${t.discountName}</label><input id="dName"></div>
          <div class="row"><label>${t.discountValue}</label><input id="dValue" type="number"></div>
          <div class="actions"><button id="addBtn" class="btn primary">${t.save}</button></div>
        </div>
        <div class="panel">${items || '—'}</div>
      </section>
    </main>`;
  bindNav();
  document.getElementById('logoutBtn').onclick = async () => { await signOut(auth); };
  document.getElementById('addBtn').onclick = async () => {
    await addDoc(colRef, {
      name: document.getElementById('dName').value,
      value: Number(document.getElementById('dValue').value)
    });
    renderDiscounts();
  };
  document.querySelectorAll('.del').forEach(btn => {
    btn.onclick = async () => {
      await deleteDoc(doc(db, 'discounts', btn.dataset.id));
      renderDiscounts();
    };
  });
}

async function renderUsers() {
  const t = texts[lang];
  if (currentUser.email !== OWNER_EMAIL) { view = 'dashboard'; renderApp(); return; }

  const snap = await getDocs(collection(db, 'userRequests'));
  let rows = [];
  snap.forEach(d => rows.push({ id: d.id, ...d.data() }));
  rows.sort((a,b) => (a.status==='pending'?0:1) - (b.status==='pending'?0:1));

  let items = '';
  rows.forEach(r => {
    const statusLabel = r.status === 'approved' ? '✓ Approved' : r.status === 'rejected' ? '✕ Rejected' : t.pendingApproval;
    items += `
      <div class="list-item" data-id="${r.id}">
        <span>${escapeHtml(r.email)} — ${statusLabel}</span>
        ${r.status !== 'approved' ? `<button class="approve-btn" data-id="${r.id}">${t.approve}</button>` : ''}
        ${r.status !== 'rejected' ? `<button class="del reject-btn" data-id="${r.id}">${t.reject}</button>` : ''}
      </div>`;
  });
  if (!rows.length) items = `<div class="status">${t.noPending}</div>`;

  root.innerHTML = `
    <main class="shell">
      ${sidebar(t, 4, true)}
      <section class="content">
        <div class="topbar">
          <h2>${t.users}</h2>
          <button id="logoutBtn" class="btn">${t.logoutBtn}</button>
        </div>
        <div class="panel" style="max-width:820px;">${items}</div>
      </section>
    </main>`;
  bindNav();
  document.getElementById('logoutBtn').onclick = async () => { await signOut(auth); };

  document.querySelectorAll('.approve-btn').forEach(btn => {
    btn.onclick = async () => {
      await updateDoc(doc(db, 'userRequests', btn.dataset.id), { status: 'approved' });
      renderUsers();
    };
  });
  document.querySelectorAll('.reject-btn').forEach(btn => {
    btn.onclick = async () => {
      await updateDoc(doc(db, 'userRequests', btn.dataset.id), { status: 'rejected' });
      renderUsers();
    };
  });
}

function renderApp() {
  if (!currentUser) { renderLoginView(); return; }
  if (view === 'dashboard') renderDashboard();
  else if (view === 'products') renderProducts();
  else if (view === 'popup') renderPopup();
  else if (view === 'discounts') renderDiscounts();
  else if (view === 'users') renderUsers();
}

onAuthStateChanged(auth, async (user) => {
  if (!user) { currentUser = null; view = 'dashboard'; renderApp(); return; }

  if (user.email === OWNER_EMAIL) {
    currentUser = user;
    view = 'dashboard';
    pendingMessage = '';
    renderApp();
    return;
  }

  const t = texts[lang];
  const reqSnap = await getDoc(doc(db, 'userRequests', user.uid));
  if (!reqSnap.exists() || reqSnap.data().status !== 'approved') {
    const status = reqSnap.exists() ? reqSnap.data().status : 'pending';
    pendingMessage = status === 'rejected' ? t.accountRejected : t.accountPending;
    await signOut(auth);
    currentUser = null;
    view = 'dashboard';
    renderApp();
    return;
  }

  currentUser = user;
  view = 'dashboard';
  pendingMessage = '';
  renderApp();
});
</script>
</body>
</html>
